<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hii Studio Premium | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #0076FF;
            --accent: #00D2FF;
            --bg: #F0F4F8;
            --glass: rgba(255, 255, 255, 0.7);
            --card-shadow: 0 20px 40px rgba(0, 118, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 210, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 118, 255, 0.1) 0px, transparent 50%);
            color: #1d1d1f;
            min-height: 100vh;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3); position: sticky; top: 0; z-index: 100;
        }

        header h2 { 
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 800; font-size: 26px; cursor: pointer;
        }

        .pro-badge {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white; padding: 5px 15px; border-radius: 50px; font-size: 11px; font-weight: 600;
        }

        .hero { text-align: center; padding: 60px 20px 30px; }
        .hero h1 { font-size: 45px; margin-bottom: 10px; font-weight: 800; letter-spacing: -1px; }

        .container { max-width: 1100px; margin: auto; padding: 0 5% 50px; }

        .tools {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        .card {
            background: var(--glass); padding: 40px 20px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5); text-align: center;
            cursor: pointer; transition: 0.3s ease; box-shadow: var(--card-shadow);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); background: white; }
        .card span { font-size: 40px; display: block; margin-bottom: 15px; }

        .editor {
            display: none; background: white; padding: 30px; border-radius: 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05); margin-bottom: 50px;
        }

        .upload-box {
            border: 2px dashed #C7D2FE; background: #F8FAFF; padding: 50px;
            text-align: center; border-radius: 25px; cursor: pointer;
            margin-bottom: 30px; color: var(--primary); font-weight: 600;
        }

        .upload-box.dragover { background: #E0E7FF; border-color: var(--primary); }

        .editor-grid { display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        @media (max-width: 850px) { .editor-grid { grid-template-columns: 1fr; } }

        .canvas-container { 
            display: flex; justify-content: center; align-items: center; 
            background: #f1f1f1; border-radius: 20px; overflow: hidden; padding: 20px;
        }
        canvas { max-width: 100%; height: auto; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        .side-panel { background: #F8FAFF; padding: 25px; border-radius: 25px; }
        label { font-size: 11px; color: #86868b; margin-bottom: 6px; display: block; font-weight: 700; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #E5E7EB; margin-bottom: 15px; }

        button {
            padding: 14px; border: none; border-radius: 15px; cursor: pointer;
            font-weight: 700; width: 100%; margin-bottom: 10px; transition: 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); }
        button:hover { transform: scale(1.02); opacity: 0.9; }

        footer { text-align: center; padding: 40px; color: #86868b; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <h2 onclick="location.reload()">Hii Studio</h2>
    <div class="pro-badge">PREMIUM</div>
</header>

<section class="hero">
    <h1>Smart Image Studio</h1>
    <p>Fast, Secure, and Elegant Image Processing.</p>
</section>

<div class="container">
    <div class="tools" id="tools-menu">
        <div class="card" onclick="openEditor()"><span>🔄</span><h3>Convert & Resize</h3></div>
        <div class="card" onclick="openEditor()"><span>✨</span><h3>Edit Image</h3></div>
        <div class="card" onclick="openEditor()"><span>🪄</span><h3>Background Tools</h3></div>
    </div>

    <div class="editor" id="editor-ui">
        <div class="upload-box" id="drop-zone">Click or Drop Image to Start</div>
        <input type="file" id="file-input" hidden accept="image/*">

        <div class="editor-grid">
            <div class="canvas-container">
                <canvas id="main-canvas"></canvas>
            </div>
            
            <div class="side-panel">
                <label>Width (px)</label>
                <input type="number" id="img-width">
                
                <label>Height (px)</label>
                <input type="number" id="img-height">

                <label>Format</label>
                <select id="img-format">
                    <option value="image/jpeg">JPG</option>
                    <option value="image/png">PNG</option>
                    <option value="image/webp">WEBP</option>
                </select>

                <button class="btn-outline" onclick="rotate90()">🔄 Rotate 90°</button>
                <button class="btn-primary" onclick="downloadImg()">⬇️ Download Image</button>
                <button class="btn-outline" style="border-color:#ddd; color:#666;" onclick="location.reload()">Reset</button>
            </div>
        </div>
    </div>
</div>

<footer>© 2026 Hii Studio Premium | Privacy Focused</footer>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    let originalImg = new Image();
    let aspectR = 1;

    function openEditor() {
        document.getElementById('editor-ui').style.display = 'block';
        document.getElementById('tools-menu').style.display = 'none';
    }

    // Click to upload
    dropZone.addEventListener('click', () => fileInput.click());

    // File selection
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    // Drag and Drop
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
        if (files.length === 0) return;
        const file = files[0];
        if (!file.type.startsWith('image/')) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            originalImg.onload = () => {
                aspectR = originalImg.height / originalImg.width;
                resetCanvas(originalImg.width, originalImg.height);
                
                document.getElementById('img-width').value = originalImg.width;
                document.getElementById('img-height').value = originalImg.height;
                dropZone.innerText = "File: " + file.name;
            };
            originalImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function resetCanvas(w, h) {
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(originalImg, 0, 0, w, h);
    }

    // Live Resize Logic
    document.getElementById('img-width').addEventListener('input', function() {
        if (!originalImg.src) return;
        const newW = this.value;
        const newH = Math.round(newW * aspectR);
        document.getElementById('img-height').value = newH;
        updateCanvas(newW, newH);
    });

    document.getElementById('img-height').addEventListener('input', function() {
        if (!originalImg.src) return;
        const newH = this.value;
        const newW = Math.round(newH / aspectR);
        document.getElementById('img-width').value = newW;
        updateCanvas(newW, newH);
    });

    function updateCanvas(w, h) {
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(originalImg, 0, 0, w, h);
    }

    function rotate90() {
        if (!originalImg.src) return;
        const oldW = canvas.width;
        const oldH = canvas.height;
        
        const tempCanvas = document.createElement('canvas');
        const tCtx = tempCanvas.getContext('2d');
        tempCanvas.width = oldH;
        tempCanvas.height = oldW;
        
        tCtx.translate(oldH/2, oldW/2);
        tCtx.rotate(Math.PI/2);
        tCtx.drawImage(canvas, -oldW/2, -oldH/2);
        
        canvas.width = oldH;
        canvas.height = oldW;
        ctx.clearRect(0,0, canvas.width, canvas.height);
        ctx.drawImage(tempCanvas, 0, 0);
        
        // Update inputs
        document.getElementById('img-width').value = canvas.width;
        document.getElementById('img-height').value = canvas.height;
        aspectR = canvas.height / canvas.width;
    }

    function downloadImg() {
        if (!originalImg.src) return;
        const format = document.getElementById('img-format').value;
        const link = document.createElement('a');
        link.download = 'hii-studio-edited.' + format.split('/')[1];
        link.href = canvas.toDataURL(format, 0.9);
        link.click();
    }
</script>

</body>
</html>
